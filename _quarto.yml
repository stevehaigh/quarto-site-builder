project:
  type: website
  output-dir: _site
  resources:
    - "decks/**"
    - "assets/**"
    - CNAME

website:
  title: "Steve"
  description: "Notes on biomedical research, computational modelling, and software."
  site-url: https://haigh.bio  # change to your domain once you have one
  repo-url: https://github.com/stevehaigh/quarto-site-builder  # change me
  navbar:
    pinned: true
    right:
      - href: index.qmd
        text: Home
      - href: blog.qmd
        text: Blog
      - href: projects.qmd
        text: Projects & Decks
      - href: about.qmd
        text: About
      - icon: github
        href: https://github.com/stevehaigh  # change me
        aria-label: GitHub
  page-footer:
    border: true
    left: "© 2026 Steve · Built with [Quarto](https://quarto.org)"
    right:
      - icon: github
        href: https://github.com/stevehaigh  # change me
      - icon: rss
        href: blog.xml

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    toc: true
    code-copy: true
    anchor-sections: true
    smooth-scroll: true

execute:
  freeze: auto  # re-render only when source changes
