project:
  type: website
  output-dir: _site
  post-render:
    - bin/clean-urls.sh
  resources:
    - "decks/**"
    - CNAME

website:
  title: "Steve Haigh · Computational Biology"
  description: "Notes on biomedical research, computational modelling, and software."
  favicon: favicon.svg
  site-url: https://haigh.bio
  repo-url: https://github.com/stevehaigh/quarto-site-builder
  navbar:
    pinned: true
    right:
      - href: index.qmd
        text: Home
      - href: blog/index.qmd
        text: Blog
      - href: projects/index.qmd
        text: Projects & Decks
      - href: about/index.qmd
        text: About
      - icon: github
        href: https://github.com/stevehaigh
        aria-label: GitHub
  page-footer:
    border: true
    left: "© 2026 Steve Haigh · Built with [Quarto](https://quarto.org)"
    right:
      - icon: github
        href: https://github.com/stevehaigh
      - icon: rss
        href: blog/index.xml

format:
  html:
    respect-user-color-scheme: true
    theme:
      light: flatly
      dark: darkly
    css: styles.css
    toc: true
    code-copy: true
    anchor-sections: true
    smooth-scroll: true
    lightbox: auto  # click any image to view full-screen (needs `quarto add quarto-ext/lightbox`)
    include-in-header:
      - text: |
          <script data-goatcounter="https://stevehaigh.goatcounter.com/count"
                  async src="//gc.zgo.at/count.js"></script>
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@500;600&display=swap" rel="stylesheet">
    include-after-body:
      - text: |
          <script>
          // Email obfuscation, applied site-wide: linkify "#email" placeholder
          // anchors and fill any #contact-email slot, without the address in the HTML.
          (function () {
            const u = "steve", d = "haigh.bio", addr = u + "@" + d;
            document.querySelectorAll('a[href$="#email"]').forEach(a => { a.href = "mailto:" + addr; });
            const slot = document.getElementById("contact-email");
            if (slot) {
              const a = document.createElement("a");
              a.href = "mailto:" + addr;
              a.textContent = addr;
              slot.appendChild(a);
            }
          })();
          </script>

execute:
  freeze: auto  # re-render only when source changes
